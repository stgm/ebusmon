server:
  port: 6789

ebusd:
  host: 192.168.178.27
  port: 8888

# Each entry is one chart/KPI tile.
# Multiple lines under one dash (-) share the same chart.
# Format: Display name: FieldName, log_field_name, min_bound, max_bound
#  - values outside [min_bound, max_bound] are filtered out
# Log field name and bounds are optional: Display name: FieldName
charts:
  - Room: RoomTemp, 10, 35
    Target: TargetTempHc, target_room_temp, 10, 30

  - Water: HwcTemp, dhw_temp, 5, 80
    Target: TargetTempHwc, target_hwc_temp, 10, 80

  - Flow temp: FlowTemp, -5, 90
    Target: TargetFlowTemp, -5, 90
  - Return temp: RunDataReturnTemp, return_temp, -5, 80

  - Outdoor: OutdoorTemp, outside_temp, -30, 50
    Intake: AirIntakeTemp, -30, 60

  - Compressor: RunDataCompressorSpeed, compressor_speed, 0, 200
  - Power: RunDataElectricPowerConsumption, power_consumption, 0, 15
    Yield: CurrentYieldPower, power_yield, 0, 20
  - Energy integral: EnergyIntegral, -300, 50
  - Heat curve: HeatCurve, 0, 5
  - Circuit flow: BuildingCircuitFlow, flow, 0, 3000
  - Flow pressure: FlowPressure, 0, 5

# Indicators shown in the header.
# Conditions are ANDed: string value → field contains that substring (case-insensitive)
#                       "on"         → numeric field value > 0
indicators:
  - Heat:
      ThreeWayValve: heat
      RunDataCompressorSpeed: "on"

  - Water:
      ThreeWayValve: warm water
      RunDataCompressorSpeed: "on"
